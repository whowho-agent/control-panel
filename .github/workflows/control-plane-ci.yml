name: control-plane-ci

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff pytest httpx

      - name: Ruff
        run: |
          ruff check app tests

      - name: Import smoke check
        run: |
          python - <<'PY'
          import app.main
          import app.api.ui
          import app.api.xray_frontend
          import app.services.xray_frontend_service
          print('smoke-ok')
          PY

      - name: Pytest smoke
        run: |
          pytest -q tests/test_smoke.py tests/test_ui_smoke.py

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: false
