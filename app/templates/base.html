<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title or 'Xray Control Plane' }}</title>
  <style>
    :root {
      --bg:#0b1020; --panel:#121933; --panel2:#182240;
      --text:#e9eefc; --muted:#9aa8d6;
      --ok:#25c27a; --bad:#f05d5e; --warn:#f0b24d;
      --line:#2b3561; --link:#7ab8ff;
      --accent:#3b82f6; --danger:#c0392b;
    }
    * { box-sizing:border-box; }
    body { margin:0; background:linear-gradient(180deg,#0b1020,#0d1428); color:var(--text); font-family:Inter,system-ui,sans-serif; font-size:14px; }
    h1 { font-size:20px; font-weight:600; margin:0 0 20px; }
    h2 { font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin:0 0 14px; }
    .wrap { max-width:1380px; margin:0 auto; padding:24px; }
    .nav { display:flex; gap:8px; margin-bottom:24px; align-items:center; }
    .nav a { color:var(--text); text-decoration:none; background:var(--panel); border:1px solid var(--line); padding:8px 14px; border-radius:8px; transition:background .15s,border-color .15s; }
    .nav a:hover { background:var(--panel2); border-color:#3d4f80; }
    .nav a.active { background:var(--panel2); border-color:var(--link); color:var(--link); }
    .grid { display:grid; grid-template-columns:repeat(12,1fr); gap:16px; }
    .card { background:rgba(18,25,51,.92); border:1px solid var(--line); border-radius:16px; padding:20px; box-shadow:0 8px 28px rgba(0,0,0,.25); }
    .kpi { font-size:28px; font-weight:700; margin-top:8px; }
    .small { color:var(--muted); font-size:12px; }
    .badge { display:inline-block; padding:3px 10px; border-radius:999px; font-size:11px; font-weight:700; letter-spacing:.02em; }
    .ok { background:rgba(37,194,122,.15); color:#7ef0b0; }
    .bad { background:rgba(240,93,94,.15); color:#ff9b9b; }
    .warn { background:rgba(240,178,77,.15); color:#ffd28a; }
    .flash { margin-bottom:16px; padding:12px 16px; border-radius:10px; border:1px solid var(--line); }
    .flash.ok { background:rgba(37,194,122,.12); color:#7ef0b0; border-color:rgba(37,194,122,.3); }
    .flash.bad { background:rgba(240,93,94,.12); color:#ffb2b2; border-color:rgba(240,93,94,.3); }
    .topology { display:grid; grid-template-columns:1fr 100px 1fr 100px 1fr; gap:10px; align-items:center; }
    .node { background:var(--panel2); border:1px solid var(--line); border-radius:12px; padding:16px; min-height:110px; }
    .arrow { text-align:center; color:var(--muted); font-size:20px; }
    table { width:100%; border-collapse:collapse; }
    th { color:var(--muted); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; border-bottom:1px solid var(--line); padding:8px 10px; text-align:left; }
    td { border-bottom:1px solid rgba(43,53,97,.5); padding:10px; text-align:left; vertical-align:middle; }
    label { display:block; font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; }
    input { width:100%; background:#0b1020; color:var(--text); border:1px solid var(--line); border-radius:8px; padding:9px 12px; font-size:14px; transition:border-color .15s; }
    input:focus { outline:none; border-color:var(--link); }
    button { background:var(--accent); color:white; cursor:pointer; border:none; border-radius:8px; padding:9px 16px; font-size:14px; font-weight:500; transition:filter .15s; }
    button:hover { filter:brightness(1.15); }
    button.danger { background:var(--danger); }
    button.secondary { background:transparent; border:1px solid var(--line); color:var(--text); }
    button.secondary:hover { border-color:var(--link); filter:none; }
    button.success { background:var(--ok); color:#0b1020; }
    button.sm { padding:5px 11px; font-size:12px; }
    input[type="checkbox"] { width:15px; height:15px; accent-color:var(--accent); cursor:pointer; }
    tbody tr:hover { background:rgba(255,255,255,.03); }
    code { font-size:12px; word-break:break-all; color:var(--muted); }
    a { color:var(--link); }
  </style>
</head>
<body>
  <main class="wrap">
    <nav class="nav" aria-label="Main navigation">
      <a href="/" class="{{ 'active' if request.url.path == '/' else '' }}" aria-current="{{ 'page' if request.url.path == '/' else 'false' }}">Dashboard</a>
      <a href="/clients" class="{{ 'active' if request.url.path == '/clients' else '' }}" aria-current="{{ 'page' if request.url.path == '/clients' else 'false' }}">Clients</a>
      <a href="/config" class="{{ 'active' if request.url.path == '/config' else '' }}" aria-current="{{ 'page' if request.url.path == '/config' else 'false' }}">Config</a>
      <div class="small" style="margin-left:auto;">Version: {{ request.app.version }}</div>
    </nav>
    {% if success_message %}
    <div class="flash ok" role="alert">{{ success_message }}</div>
    {% endif %}
    {% if error_message %}
    <div class="flash bad" role="alert">{{ error_message }}</div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
