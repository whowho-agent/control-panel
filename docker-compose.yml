services:
  control-plane:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xray-control-plane
    restart: unless-stopped
    network_mode: host
    pid: host
    privileged: true
    environment:
      XRAY_FRONTEND_CONFIG_PATH: ${XRAY_FRONTEND_CONFIG_PATH:?set-in-.env}
      XRAY_FRONTEND_ACCESS_LOG_PATH: ${XRAY_FRONTEND_ACCESS_LOG_PATH:?set-in-.env}
      XRAY_FRONTEND_SERVICE_NAME: ${XRAY_FRONTEND_SERVICE_NAME:-xray-frontend}
      XRAY_FRONTEND_USE_NSENTER: ${XRAY_FRONTEND_USE_NSENTER:-1}
      XRAY_BINARY_PATH: ${XRAY_BINARY_PATH:?set-in-.env}
      XRAY_CLIENT_META_PATH: ${XRAY_CLIENT_META_PATH:?set-in-.env}
      XRAY_RELAY_HOST: ${XRAY_RELAY_HOST:?set-in-.env}
      XRAY_RELAY_PORT: ${XRAY_RELAY_PORT:?set-in-.env}
      XRAY_RELAY_AGENT_URL: ${XRAY_RELAY_AGENT_URL:-http://${XRAY_RELAY_HOST}:9100}
      XRAY_TRANSPORT_MODE: ${XRAY_TRANSPORT_MODE:-direct}
      XRAY_RELAY_PUBLIC_HOST: ${XRAY_RELAY_PUBLIC_HOST:-${XRAY_RELAY_HOST}}
      XRAY_RELAY_PRIVATE_HOST: ${XRAY_RELAY_PRIVATE_HOST:-}
      XRAY_IPSEC_LOCAL_TUNNEL_IP: ${XRAY_IPSEC_LOCAL_TUNNEL_IP:-}
      XRAY_IPSEC_REMOTE_TUNNEL_IP: ${XRAY_IPSEC_REMOTE_TUNNEL_IP:-}
      XRAY_ONLINE_WINDOW_MINUTES: ${XRAY_ONLINE_WINDOW_MINUTES:-5}
      XRAY_EXPECTED_EGRESS_IP: ${XRAY_EXPECTED_EGRESS_IP:?set-in-.env}
      XRAY_ADMIN_USER: ${XRAY_ADMIN_USER:?set-in-.env}
      XRAY_ADMIN_PASSWORD: ${XRAY_ADMIN_PASSWORD:?set-in-.env}
      XRAY_TOPOLOGY_CACHE_TTL_SECONDS: ${XRAY_TOPOLOGY_CACHE_TTL_SECONDS:-10}
    volumes:
      - ${XRAY_FRONTEND_HOST_RUNTIME_DIR:-/opt/xray-frontend}/config.json:/data/frontend/config.json:rw
      - ${XRAY_FRONTEND_HOST_RUNTIME_DIR:-/opt/xray-frontend}/access.log:/data/frontend/access.log:rw
      - ${XRAY_FRONTEND_HOST_RUNTIME_DIR:-/opt/xray-frontend}/clients-meta.json:/data/frontend/clients-meta.json:rw
      - ${XRAY_FRONTEND_HOST_RUNTIME_DIR:-/opt/xray-frontend}/xray:/data/frontend/xray:ro
