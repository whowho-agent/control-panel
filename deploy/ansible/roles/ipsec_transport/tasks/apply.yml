- name: Render ipsec.conf for route-based v2 baseline
  template:
    src: ipsec.conf.j2
    dest: /etc/ipsec.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart ipsec

- name: Render ipsec.secrets
  template:
    src: ipsec.secrets.j2
    dest: /etc/ipsec.secrets
    owner: root
    group: root
    mode: '0600'
  notify: restart ipsec

- name: Enable and start strongSwan
  systemd:
    name: strongswan-starter
    enabled: true
    state: started

- name: Enable and start XFRM interface unit
  systemd:
    name: ipsec-xfrm.service
    enabled: true
    state: started
