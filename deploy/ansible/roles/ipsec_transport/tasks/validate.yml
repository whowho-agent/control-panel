- name: Validate backend-specific strongSwan service is active
  command: systemctl is-active {{ ipsec_service_unit }}
  register: ipsec_service_status
  changed_when: false
  failed_when: ipsec_service_status.stdout.strip() != 'active'

- name: Validate XFRM interface unit is active
  command: systemctl is-active ipsec-xfrm.service
  register: ipsec_xfrm_status
  changed_when: false
  failed_when: ipsec_xfrm_status.stdout.strip() != 'active'

- name: Validate local tunnel IP is configured on XFRM interface
  shell: ip -4 addr show dev {{ ipsec_interface_name }} | grep -F 'inet {{ ipsec_local_tunnel_ip }} '
  changed_when: false

- name: Collect IPSec route table state
  command: ip route show table {{ ipsec_route_table }}
  register: ipsec_route_table_state
  changed_when: false
  retries: 5
  delay: 2
  until: ipsec_route_table_state.stdout | length > 0

- name: Validate route to remote tunnel IP exists in IPSec route table
  assert:
    that:
      - ipsec_route_table_state.stdout_lines | select('match', '^' ~ (ipsec_remote_tunnel_ip | replace('.', '\\.')) ~ '(/32)? dev ' ~ ipsec_interface_name ~ '( |$)') | list | length > 0
    fail_msg: "Missing remote tunnel route {{ ipsec_remote_tunnel_ip }}/32 via {{ ipsec_interface_name }} in table {{ ipsec_route_table }}"

- name: Validate route to each protected destination exists in IPSec route table
  assert:
    that:
      - ipsec_route_table_state.stdout_lines | select('match', '^' ~ (item | replace('.', '\\.')) ~ '(/32)? dev ' ~ ipsec_interface_name ~ '( |$)') | list | length > 0
    fail_msg: "Missing protected destination route {{ item }}/32 via {{ ipsec_interface_name }} in table {{ ipsec_route_table }}"
  loop: "{{ ipsec_policy_route_destinations }}"

- name: Validate only narrow protected-host routes are installed
  shell: |
    ip route show table {{ ipsec_route_table }} | awk '{print $1}' | sed 's#/32$##'
  register: ipsec_route_table_entries
  changed_when: false
  failed_when: >-
    (ipsec_route_table_entries.stdout_lines | default([]) | difference(
      [ipsec_remote_tunnel_ip] + ipsec_policy_route_destinations
    )) | length > 0

- name: Collect policy rule state
  command: ip rule show
  register: ipsec_rule_state
  changed_when: false

- name: Validate policy rule for each protected destination exists
  assert:
    that:
      - ipsec_rule_state.stdout_lines | select('search', 'to ' ~ item) | select('search', 'lookup ' ~ (ipsec_route_table | string)) | list | length > 0 or ipsec_rule_state.stdout_lines | select('search', 'to ' ~ item) | select('search', 'lookup ' ~ ipsec_route_table_name) | list | length > 0
    fail_msg: "Missing narrow policy rule for protected destination {{ item }} into table {{ ipsec_route_table }}"
  loop: "{{ ipsec_policy_route_destinations }}"

- name: Validate no generic lookup rule captures all traffic into the IPSec route table
  assert:
    that:
      - ipsec_rule_state.stdout_lines | select('match', '^[0-9]+:.*from all lookup ' ~ (ipsec_route_table | string) ~ '( |$)') | list | length == 0
      - ipsec_rule_state.stdout_lines | select('match', '^[0-9]+:.*from all lookup ' ~ ipsec_route_table_name ~ '( |$)') | list | length == 0
    fail_msg: "Found unexpected generic lookup rule into IPSec route table {{ ipsec_route_table }}"

- name: Validate policy rules do not capture peer public IP
  assert:
    that:
      - ipsec_rule_state.stdout_lines | select('search', 'to ' ~ ipsec_remote_public_ip) | select('search', 'lookup ' ~ (ipsec_route_table | string)) | list | length == 0
      - ipsec_rule_state.stdout_lines | select('search', 'to ' ~ ipsec_remote_public_ip) | select('search', 'lookup ' ~ ipsec_route_table_name) | list | length == 0
    fail_msg: "Peer public IP {{ ipsec_remote_public_ip }} must not be captured by IPSec policy routing"

- name: Validate xfrm interface id is present on device
  shell: >-
    ip -d link show {{ ipsec_interface_name }} |
    grep -E 'if_id ({{ ipsec_interface_id }}|0x{{ "%x" | format(ipsec_interface_id | int) }})'
  changed_when: false

- name: Collect backend-specific SA status output
  command: "{{ ipsec_status_command }}"
  register: ipsec_sa_status
  changed_when: false

- name: Validate backend-specific status output reports an established SA
  assert:
    that:
      - ipsec_backend == 'starter' and ('ESTABLISHED' in ipsec_sa_status.stdout) or ipsec_backend == 'swanctl' and (('ESTABLISHED' in ipsec_sa_status.stdout) or ('INSTALLED' in ipsec_sa_status.stdout))
    fail_msg: "Backend {{ ipsec_backend }} did not report an established/installed SA"

- name: Validate protected endpoint is reachable across the tunnel
  wait_for:
    host: "{{ ipsec_validation_host }}"
    port: "{{ xray_relay_port if 'gateway' in group_names else 22 }}"
    timeout: 15

- name: Check whether firewall ruleset tooling is present
  shell: command -v nft || command -v iptables || true
  register: firewall_tool_check
  changed_when: false

- name: Warn when firewall ruleset tooling is absent on host
  debug:
    msg: "Firewall tooling (nft/iptables) is absent on this host; skipping firewall-tooling validation because clean minimal images may not ship it by default."
  when: (firewall_tool_check.stdout | trim) == ''

- name: Normalize controller-side external reachability ports input
  set_fact:
    ipsec_external_reachability_ports_normalized: >-
      {{
        (
          ipsec_external_reachability_ports
          if (ipsec_external_reachability_ports is sequence and ipsec_external_reachability_ports is not string)
          else (ipsec_external_reachability_ports | default([]) | from_yaml)
        )
      }}
  when: ipsec_validate_external_reachability | bool

- name: Derive host-specific supplemental public reachability ports
  set_fact:
    ipsec_external_reachability_ports_effective: >-
      {{ (ipsec_external_reachability_ports_normalized | default([])) if ('gateway' in group_names) else [] }}
  when: ipsec_validate_external_reachability | bool

- name: Derive controller-side external reachability targets
  set_fact:
    ipsec_external_reachability_targets: >-
      {{ ([hostvars[inventory_hostname].ansible_port | default(22) | int] + (ipsec_external_reachability_ports_effective | default([]))) | map('int') | unique }}
  when: ipsec_validate_external_reachability | bool

- name: Validate controller can still reach host public TCP ports after IPSec apply
  wait_for:
    host: "{{ hostvars[inventory_hostname].ansible_host }}"
    port: "{{ item }}"
    timeout: "{{ ipsec_external_reachability_timeout }}"
    delay: "{{ ipsec_external_reachability_delay }}"
    state: started
  delegate_to: localhost
  become: false
  loop: "{{ ipsec_external_reachability_targets }}"
  when: ipsec_validate_external_reachability | bool

- name: Report whether service cutover is enabled
  debug:
    msg: >-
      IPSec transport validated via backend {{ ipsec_backend }}. Service cutover management is
      {{ 'enabled' if ipsec_manage_service_cutover | bool else 'disabled' }}.
