- name: Wait for unattended-upgrades/apt/dpkg lock contention to clear before package install
  shell: |
    set -euo pipefail
    deadline=$(( $(date +%s) + 600 ))
    while [ "$(date +%s)" -lt "$deadline" ]; do
      busy=0
      for unit in apt-daily.service apt-daily-upgrade.service unattended-upgrades.service; do
        if systemctl is-active --quiet "$unit"; then
          busy=1
          break
        fi
      done
      for lock in /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock /var/lib/apt/lists/lock /var/cache/apt/archives/lock; do
        if command -v fuser >/dev/null 2>&1 && fuser "$lock" >/dev/null 2>&1; then
          busy=1
          break
        fi
      done
      if [ "$busy" -eq 0 ]; then
        exit 0
      fi
      sleep 5
    done
    echo "timed out waiting for apt/dpkg locks or unattended-upgrades" >&2
    exit 1
  changed_when: false

- name: Install strongSwan/iproute2 packages for starter backend
  apt:
    name:
      - strongswan
      - iproute2
    state: present
    update_cache: true
    lock_timeout: 600
  when: ipsec_backend == 'starter'

- name: Install strongSwan/iproute2 packages for swanctl backend
  apt:
    name:
      - strongswan-swanctl
      - charon-systemd
      - strongswan-libcharon
      - iproute2
    state: present
    update_cache: true
    lock_timeout: 600
  when: ipsec_backend == 'swanctl'

- name: Ensure /etc/swanctl exists for swanctl backend
  file:
    path: /etc/swanctl
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: ipsec_backend == 'swanctl'

- name: Ensure dedicated route table is present
  lineinfile:
    path: /etc/iproute2/rt_tables
    line: "{{ ipsec_route_table }} {{ ipsec_route_table_name }}"
    regexp: "^{{ ipsec_route_table }}\\s+{{ ipsec_route_table_name }}$"
    state: present

- name: Install XFRM setup helper script
  template:
    src: ipsec-xfrm.sh.j2
    dest: /usr/local/sbin/ipsec-xfrm.sh
    owner: root
    group: root
    mode: '0755'
  notify: restart xfrm interface

- name: Install XFRM systemd unit
  template:
    src: ipsec-xfrm.service.j2
    dest: /etc/systemd/system/ipsec-xfrm.service
    owner: root
    group: root
    mode: '0644'
  notify: restart xfrm interface

- name: Install XFRM cleanup helper script
  copy:
    dest: /usr/local/sbin/ipsec-xfrm-cleanup.sh
    owner: root
    group: root
    mode: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      IFACE="{{ ipsec_interface_name }}"
      RULE_PRIORITY="220"
      while ip rule del priority "$RULE_PRIORITY" 2>/dev/null; do
        :
      done
      {% for destination in ipsec_policy_route_destinations %}
      ip route del "{{ destination }}/32" dev "$IFACE" table "{{ ipsec_route_table }}" 2>/dev/null || true
      {% endfor %}
      ip route del "{{ ipsec_remote_tunnel_ip }}/32" dev "$IFACE" table "{{ ipsec_route_table }}" 2>/dev/null || true
      ip addr flush dev "$IFACE" 2>/dev/null || true
      ip link del "$IFACE" 2>/dev/null || true

- name: Reload systemd for XFRM unit
  systemd:
    daemon_reload: true

- name: Flush handlers after prepare stage
  meta: flush_handlers

- name: Note that rollback should be prepared before live IPSec testing
  debug:
    msg: "Before applying IPSec v2 on real test runs, arm prepare-ipsec-rollback.yml and confirm snapshots/OOB access."
