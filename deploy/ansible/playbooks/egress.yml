- name: Bootstrap egress relay
  hosts: egress
  become: true
  vars:
    project_root: "{{ deploy_project_root }}"
    deploy_project_directories:
      - "{{ project_root }}"
      - "{{ project_root }}/deploy/bootstrap"
      - "{{ project_root }}/deploy/templates"
      - "{{ project_root }}/deploy/env"
    deploy_bootstrap_assets:
      - { src: "{{ playbook_dir }}/../../bootstrap/bootstrap-egress.sh", dest: "{{ project_root }}/deploy/bootstrap/bootstrap-egress.sh", mode: "0755" }
      - { src: "{{ playbook_dir }}/../../bootstrap/lib.sh", dest: "{{ project_root }}/deploy/bootstrap/lib.sh", mode: "0644" }
      - { src: "{{ playbook_dir }}/../../templates/xray-relay.config.json.template", dest: "{{ project_root }}/deploy/templates/xray-relay.config.json.template", mode: "0644" }
  tasks:
    - include_tasks: ../tasks/mask_auto_updates.yml

    - include_tasks: ../tasks/bootstrap_project_dirs.yml

    - include_tasks: ../tasks/copy_bootstrap_assets.yml

    - name: Write egress env
      copy:
        dest: "{{ project_root }}/deploy/env/egress.env"
        mode: '0600'
        content: |
          XRAY_RELAY_PORT={{ xray_relay_port }}
          XRAY_RELAY_UUID={{ xray_relay_uuid }}
          XRAY_EXPECTED_EGRESS_IP={{ xray_expected_egress_ip }}

    - name: Run egress bootstrap
      command: bash {{ project_root }}/deploy/bootstrap/bootstrap-egress.sh {{ project_root }}/deploy/env/egress.env

    - include_tasks: ../tasks/validate_systemd_service.yml
      vars:
        deploy_validate_service_name: xray-relay
        deploy_validate_service_port: "{{ xray_relay_port }}"
