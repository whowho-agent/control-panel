- name: Bootstrap egress relay
  hosts: egress
  become: true
  vars:
    project_root: /opt/control-panel
  tasks:
    - name: Ensure project root exists
      file:
        path: "{{ project_root }}"
        state: directory
        mode: '0755'

    - name: Copy project tree to egress
      copy:
        src: "{{ playbook_dir }}/../../../"
        dest: "{{ project_root }}/"
        mode: preserve

    - name: Write egress env
      copy:
        dest: "{{ project_root }}/deploy/env/egress.env"
        mode: '0600'
        content: |
          XRAY_RELAY_PORT={{ xray_relay_port }}
          XRAY_RELAY_UUID={{ xray_relay_uuid }}
          XRAY_EXPECTED_EGRESS_IP={{ xray_expected_egress_ip }}

    - name: Run egress bootstrap
      command: bash {{ project_root }}/deploy/bootstrap/bootstrap-egress.sh {{ project_root }}/deploy/env/egress.env
