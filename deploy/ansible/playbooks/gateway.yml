- name: Bootstrap gateway frontend
  hosts: gateway
  become: true
  vars:
    project_root: "{{ deploy_project_root }}"
    deploy_effective_relay_host: "{{ xray_relay_private_host if xray_transport_mode == 'ipsec' else xray_relay_host }}"
    deploy_project_directories:
      - "{{ project_root }}"
      - "{{ project_root }}/deploy/bootstrap"
      - "{{ project_root }}/deploy/templates"
      - "{{ project_root }}/deploy/env"
    deploy_bootstrap_assets:
      - { src: "{{ playbook_dir }}/../../bootstrap/bootstrap-gateway.sh", dest: "{{ project_root }}/deploy/bootstrap/bootstrap-gateway.sh", mode: "0755" }
      - { src: "{{ playbook_dir }}/../../bootstrap/lib.sh", dest: "{{ project_root }}/deploy/bootstrap/lib.sh", mode: "0644" }
      - { src: "{{ playbook_dir }}/../../templates/xray-frontend.config.json.template", dest: "{{ project_root }}/deploy/templates/xray-frontend.config.json.template", mode: "0644" }
  tasks:
    - include_tasks: ../tasks/bootstrap_project_dirs.yml

    - include_tasks: ../tasks/copy_bootstrap_assets.yml

    - name: Write gateway env
      copy:
        dest: "{{ project_root }}/deploy/env/gateway.env"
        mode: '0600'
        content: |
          XRAY_FRONTEND_PORT={{ xray_frontend_port }}
          XRAY_FRONTEND_SERVER_NAME={{ xray_frontend_server_name }}
          XRAY_FRONTEND_TARGET={{ xray_frontend_target }}
          XRAY_FRONTEND_FINGERPRINT={{ xray_frontend_fingerprint }}
          XRAY_FRONTEND_SHORT_IDS={{ xray_frontend_short_ids }}
          XRAY_FRONTEND_REALITY_PRIVATE_KEY={{ xray_frontend_reality_private_key }}
          XRAY_RELAY_HOST={{ deploy_effective_relay_host }}
          XRAY_RELAY_PORT={{ xray_relay_port }}
          XRAY_RELAY_UUID={{ xray_relay_uuid }}

    - include_tasks: ../tasks/wait_relay_endpoint.yml
      vars:
        deploy_wait_relay_host: "{{ deploy_effective_relay_host }}"
        deploy_wait_relay_port: "{{ xray_relay_port }}"

    - name: Run gateway bootstrap
      command: bash {{ project_root }}/deploy/bootstrap/bootstrap-gateway.sh {{ project_root }}/deploy/env/gateway.env

    - include_tasks: ../tasks/validate_systemd_service.yml
      vars:
        deploy_validate_service_name: xray-frontend
        deploy_validate_service_port: "{{ xray_frontend_port }}"
