- name: Recover network access on gateway and egress
  hosts: gateway:egress
  become: true
  tasks:
    - name: Stop and disable XFRM interface unit
      systemd:
        name: ipsec-xfrm.service
        state: stopped
        enabled: false
      failed_when: false

    - name: Run XFRM cleanup helper when present
      shell: |
        if [ -x /usr/local/sbin/ipsec-xfrm-cleanup.sh ]; then
          /usr/local/sbin/ipsec-xfrm-cleanup.sh || true
        fi
      args:
        executable: /bin/bash
      failed_when: false

    - name: Stop and disable strongSwan primary swanctl service when present
      systemd:
        name: strongswan
        state: stopped
        enabled: false
      failed_when: false

    - name: Stop and disable strongSwan starter backend when present
      systemd:
        name: strongswan-starter
        state: stopped
        enabled: false
      failed_when: false

    - name: Stop and disable strongSwan swanctl backend when present
      systemd:
        name: strongswan-swanctl
        state: stopped
        enabled: false
      failed_when: false

    - name: Stop and disable charon-systemd when present
      systemd:
        name: charon-systemd
        state: stopped
        enabled: false
      failed_when: false

    - name: Restore backed-up ipsec.conf if present
      shell: |
        if [ -f /etc/ipsec.conf.bak ]; then
          cp /etc/ipsec.conf.bak /etc/ipsec.conf
        fi
      args:
        executable: /bin/bash
      failed_when: false

    - name: Restore backed-up ipsec.secrets if present
      shell: |
        if [ -f /etc/ipsec.secrets.bak ]; then
          cp /etc/ipsec.secrets.bak /etc/ipsec.secrets
        fi
      args:
        executable: /bin/bash
      failed_when: false

    - name: Restore backed-up strongswan.conf if present
      shell: |
        if [ -f /etc/strongswan.conf.bak ]; then
          cp /etc/strongswan.conf.bak /etc/strongswan.conf
        fi
      args:
        executable: /bin/bash
      failed_when: false

    - name: Restore backed-up swanctl.conf if present
      shell: |
        if [ -f /etc/swanctl/swanctl.conf.bak ]; then
          cp /etc/swanctl/swanctl.conf.bak /etc/swanctl/swanctl.conf
        fi
      args:
        executable: /bin/bash
      failed_when: false

    - name: Flush nftables ruleset when available
      shell: command -v nft >/dev/null 2>&1 && nft flush ruleset || true
      args:
        executable: /bin/bash
      failed_when: false

    - name: Flush iptables and accept all default policies
      shell: |
        iptables -F || true
        iptables -P INPUT ACCEPT || true
        iptables -P FORWARD ACCEPT || true
        iptables -P OUTPUT ACCEPT || true
      args:
        executable: /bin/bash
      failed_when: false

    - name: Restart Docker service when present to restore NAT chains
      shell: |
        if systemctl list-unit-files | grep -q '^docker\.service'; then
          systemctl restart docker || true
        fi
      args:
        executable: /bin/bash
      failed_when: false

    - name: Restart SSH service
      shell: systemctl restart ssh || systemctl restart sshd || true
      args:
        executable: /bin/bash
      failed_when: false
