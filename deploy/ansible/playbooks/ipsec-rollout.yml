---
# Staged IPSec rollout orchestration
#
# This playbook performs a safe, reversible IPSec deployment:
#   1. Arm a timed rollback on both nodes (default 10 min)
#   2. Apply IPSec tunnel (strongSwan) on both nodes
#   3. Re-deploy gateway frontend via IPSec tunnel
#   4. Re-deploy control-plane via IPSec tunnel
#   5. Validate app-path is using the private tunnel
#   6. Cancel rollback timers
#
# If any step fails, the rollback timer on the remote nodes will
# automatically restore network state after rollback_timeout_minutes.
#
# Usage:
#   ansible-playbook -i inventory.ini playbooks/ipsec-rollout.yml
#   ansible-playbook -i inventory.ini playbooks/ipsec-rollout.yml -e rollback_timeout_minutes=15
#
# Prerequisites:
#   - xray_transport_mode: ipsec  (in group_vars/all/vars.yml)
#   - ipsec_manage_service_cutover: false  (set to true to let ipsec role restart services)

- import_playbook: prepare-ipsec-rollback.yml

- import_playbook: ipsec.yml

- import_playbook: gateway.yml

- import_playbook: control-plane.yml

- name: Validate app-path cutover to IPSec tunnel
  import_playbook: validate-ipsec-app-cutover.yml
  vars:
    ipsec_expect_private_app_path: true

- import_playbook: cancel-ipsec-rollback.yml
