- name: Deploy control-plane
  hosts: gateway
  become: true
  vars:
    project_root: /opt/control-panel
  tasks:
    - name: Ensure project directories exist
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ project_root }}"
        - "{{ project_root }}/app"
        - "{{ project_root }}/deploy/bootstrap"
        - "{{ project_root }}/deploy/env"

    - name: Copy control-plane app assets
      copy:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        mode: "{{ item.mode | default('0644') }}"
      loop:
        - { src: "{{ playbook_dir }}/../../../Dockerfile", dest: "{{ project_root }}/Dockerfile" }
        - { src: "{{ playbook_dir }}/../../../docker-compose.yml", dest: "{{ project_root }}/docker-compose.yml" }
        - { src: "{{ playbook_dir }}/../../../requirements.txt", dest: "{{ project_root }}/requirements.txt" }
        - { src: "{{ playbook_dir }}/../../bootstrap/bootstrap-control-plane.sh", dest: "{{ project_root }}/deploy/bootstrap/bootstrap-control-plane.sh", mode: "0755" }
        - { src: "{{ playbook_dir }}/../../bootstrap/lib.sh", dest: "{{ project_root }}/deploy/bootstrap/lib.sh" }

    - name: Copy app package
      copy:
        src: "{{ playbook_dir }}/../../../app/"
        dest: "{{ project_root }}/app/"
        mode: preserve

    - name: Write control-plane env
      copy:
        dest: "{{ project_root }}/deploy/env/control-plane.env"
        mode: '0600'
        content: |
          XRAY_FRONTEND_CONFIG_PATH=/data/frontend/config.json
          XRAY_FRONTEND_ACCESS_LOG_PATH=/data/frontend/access.log
          XRAY_FRONTEND_SERVICE_NAME=xray-frontend
          XRAY_FRONTEND_USE_NSENTER=1
          XRAY_FRONTEND_HOST_RUNTIME_DIR=/opt/xray-frontend
          XRAY_BINARY_PATH=/data/frontend/xray
          XRAY_CLIENT_META_PATH=/data/frontend/clients-meta.json
          XRAY_RELAY_HOST={{ xray_relay_private_host if xray_transport_mode == 'ipsec' else xray_relay_host }}
          XRAY_RELAY_PORT={{ xray_relay_port }}
          XRAY_RELAY_SERVICE_NAME=xray-relay
          XRAY_RELAY_SSH_KEY_PATH=/relay_ssh_key
          XRAY_RELAY_SSH_USER={{ xray_relay_ssh_user }}
          XRAY_TRANSPORT_MODE={{ xray_transport_mode }}
          XRAY_RELAY_PUBLIC_HOST={{ xray_relay_host }}
          XRAY_RELAY_PRIVATE_HOST={{ xray_relay_private_host if xray_transport_mode == 'ipsec' else '' }}
          XRAY_IPSEC_LOCAL_TUNNEL_IP={{ xray_ipsec_gateway_tunnel_ip if xray_transport_mode == 'ipsec' else '' }}
          XRAY_IPSEC_REMOTE_TUNNEL_IP={{ xray_ipsec_egress_tunnel_ip if xray_transport_mode == 'ipsec' else '' }}
          XRAY_ONLINE_WINDOW_MINUTES=5
          XRAY_EXPECTED_EGRESS_IP={{ xray_expected_egress_ip }}
          XRAY_ADMIN_USER={{ xray_admin_user }}
          XRAY_ADMIN_PASSWORD={{ xray_admin_password }}
          XRAY_TOPOLOGY_CACHE_TTL_SECONDS=10
          XRAY_RELAY_SSH_KEY_SOURCE={{ xray_relay_ssh_key_source }}

    - name: Wait for unattended-upgrades/apt/dpkg lock contention to clear before Docker install
      shell: |
        set -euo pipefail
        deadline=$(( $(date +%s) + 600 ))
        while [ "$(date +%s)" -lt "$deadline" ]; do
          busy=0
          for unit in apt-daily.service apt-daily-upgrade.service unattended-upgrades.service; do
            if systemctl is-active --quiet "$unit"; then
              busy=1
              break
            fi
          done
          for lock in /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock /var/lib/apt/lists/lock /var/cache/apt/archives/lock; do
            if command -v fuser >/dev/null 2>&1 && fuser "$lock" >/dev/null 2>&1; then
              busy=1
              break
            fi
          done
          if [ "$busy" -eq 0 ]; then
            exit 0
          fi
          sleep 5
        done
        echo "timed out waiting for apt/dpkg locks or unattended-upgrades" >&2
        exit 1
      changed_when: false

    - name: Install Docker engine and compose plugin
      apt:
        name:
          - docker.io
          - docker-compose-v2
        state: present
        update_cache: true
        lock_timeout: 600

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: true
        state: started

    - name: Stat relay SSH key path on gateway
      stat:
        path: "{{ xray_relay_ssh_key_source }}"
      register: relay_ssh_key_path_stat

    - name: Remove relay SSH key path if it is a directory
      file:
        path: "{{ xray_relay_ssh_key_source }}"
        state: absent
      when: relay_ssh_key_path_stat.stat.isdir is defined and relay_ssh_key_path_stat.stat.isdir

    - name: Install relay SSH private key on gateway
      copy:
        src: "{{ xray_relay_ssh_private_key_local_path }}"
        dest: "{{ xray_relay_ssh_key_source }}"
        owner: "{{ xray_relay_ssh_user }}"
        group: "{{ xray_relay_ssh_user }}"
        mode: '0600'
        force: true

    - name: Wait for configured relay endpoint to become reachable before control-plane bootstrap
      wait_for:
        host: "{{ xray_relay_private_host if xray_transport_mode == 'ipsec' else xray_relay_host }}"
        port: "{{ xray_relay_port }}"
        timeout: 90
      when: (xray_relay_private_host if xray_transport_mode == 'ipsec' else xray_relay_host) | length > 0

    - name: Run control-plane bootstrap
      command: bash {{ project_root }}/deploy/bootstrap/bootstrap-control-plane.sh {{ project_root }}/deploy/env/control-plane.env

    - name: Validate control-plane health endpoint
      uri:
        url: http://127.0.0.1:8000/health
        return_content: true
      register: control_plane_health
      retries: 10
      delay: 2
      until: control_plane_health.status == 200
      changed_when: false
